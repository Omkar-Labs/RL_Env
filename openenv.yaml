name: cognitive-tutor-env
description: >
  A reinforcement learning environment simulating an adaptive cognitive tutor.
  The agent selects subtopics, difficulty levels, and hint strategies to optimize
  student learning, minimize frustration, and achieve mastery.

entry_point: env.tutor_env:TutorEnv

max_steps: 200

action_space:
  type: object
  properties:
    subtopic_index:
      type: integer
      minimum: 0
      maximum: 3
    difficulty_level:
      type: integer
      minimum: 0
      maximum: 2
    hint_given:
      type: boolean

observation_space:
  type: object
  properties:
    knowledge_levels:
      type: array
      items:
        type: number
        minimum: 0.0
        maximum: 1.0
    has_ever_mastered:
      type: array
      items:
        type: boolean
    steps_remaining:
      type: integer

reward_range: [0.0, 1.0]

episode_termination:
  conditions:
    - all_subtopics_mastered
    - max_steps_reached